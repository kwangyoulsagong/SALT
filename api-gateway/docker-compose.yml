docker-compose.yml:
```bash
version: '3.8'
services:
 postgres:
   image: postgres:latest
   ports:
     - "5432:5432"
   environment:
     POSTGRES_USER: salt
     POSTGRES_PASSWORD: salt1234
     POSTGRES_DB: salt_db

 redis:
   image: redis:latest
   ports:
     - "6379:6379"

 zookeeper:
   image: confluentinc/cp-zookeeper:latest
   ports:
     - "2181:2181"
   environment:
     ZOOKEEPER_CLIENT_PORT: 2181
     
 kafka:
   image: confluentinc/cp-kafka:latest
   depends_on:
     - zookeeper
   ports:
     - "9092:9092"
   environment:
     KAFKA_BROKER_ID: 1
     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1